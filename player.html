<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LOTATO · Joueur</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            padding-bottom: 80px;
            min-height: 100vh;
        }
        .app {
            max-width: 550px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            min-height: 100vh;
            border-radius: 0 0 32px 32px;
            overflow: hidden;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }
        /* Header avec dégradé animé */
        .header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            color: white;
            padding: 20px 22px 18px;
            position: sticky;
            top: 0;
            z-index: 20;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        .balance {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
        }
        .logout-btn {
            background: rgba(239,68,68,0.2);
            border: 1px solid #ef4444;
            color: #fecaca;
            padding: 5px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }
        /* Carrousel publicitaire */
        .carousel-container {
            background: #00000010;
            border-radius: 20px;
            margin: 15px 15px 0;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .carousel-slide {
            min-width: 100%;
            box-sizing: border-box;
            text-align: center;
            padding: 15px;
        }
        .carousel-slide img {
            max-height: 120px;
            width: auto;
            max-width: 90%;
            border-radius: 16px;
            object-fit: contain;
        }
        .carousel-text {
            background: #fef9c3;
            color: #854d0e;
            font-weight: bold;
            padding: 10px;
            border-radius: 30px;
            margin: 0 15px 15px;
            text-align: center;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); background: #fde047; }
            100% { opacity: 0.8; transform: scale(1); }
        }
        /* Tabs modernes */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e9edf2;
            position: sticky;
            top: 84px;
            z-index: 15;
            padding: 0 12px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 0 12px;
            font-weight: 600;
            color: #6c7a91;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }
        .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
            background: rgba(59,130,246,0.04);
        }
        /* Écrans */
        .screen {
            display: none;
            padding: 20px;
            background: #f8fafc;
            min-height: calc(100vh - 140px);
        }
        .screen.active {
            display: block;
        }
        /* Cartes */
        .card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }
        /* Tirages */
        .draws-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 2px 12px;
            scrollbar-width: thin;
        }
        .draw-chip {
            background: #f1f4f9;
            border-radius: 60px;
            padding: 8px 22px;
            white-space: nowrap;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .draw-chip.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.4);
        }
        .draw-chip.disabled {
            opacity: 0.5;
            text-decoration: line-through;
            cursor: not-allowed;
        }
        /* Jeux */
        .game-category { margin-bottom: 20px; }
        .category-title { font-weight: 700; margin-bottom: 10px; color: #1e293b; }
        .sub-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
        .game-btn, .sub-btn {
            background: #f0f3f8;
            border: 1px solid #e2e8f0;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .game-btn.active, .sub-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
            transform: scale(0.98);
        }
        .sub-btn.auto-chip {
            background: #fef9e3;
            border-color: #fbbf24;
            color: #b45309;
        }
        /* Options */
        .options-panel { display: flex; gap: 12px; margin: 15px 0 10px; flex-wrap: wrap; }
        .option-chip {
            background: #eef2ff;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
        }
        .option-chip.active { background: #3b82f6; color: white; }
        /* Mise */
        .bet-row { display: flex; gap: 10px; margin: 18px 0 8px; align-items: center; flex-wrap: wrap; }
        .bet-row input {
            width: 120px; padding: 12px; border: 1px solid #cbd5e1;
            border-radius: 48px; font-size: 0.9rem; text-align: center;
        }
        .btn-add-icon {
            background: #3b82f6; border: none; border-radius: 50%; width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 1.8rem; cursor: pointer; transition: 0.2s;
        }
        .btn-add-icon:hover { background: #2563eb; transform: scale(1.05); }
        /* Panier */
        .cart-items { max-height: 240px; overflow-y: auto; margin: 15px 0; }
        .cart-item {
            background: #f8fafc; border-radius: 60px; padding: 10px 16px;
            margin-bottom: 8px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #e2edf7;
        }
        .cart-total {
            background: #eef2ff; border-radius: 60px; padding: 12px;
            text-align: center; font-weight: 800; margin: 12px 0;
        }
        .btn-confirm {
            background: #10b981; width: 100%; padding: 14px;
            border-radius: 60px; font-weight: 800; border: none;
            color: white; cursor: pointer; transition: 0.2s;
        }
        .btn-confirm:active { transform: scale(0.97); }
        /* Historique et résultats */
        .history-card, .result-card {
            background: white; border-radius: 24px; padding: 16px;
            margin-bottom: 12px; border-left: 5px solid #3b82f6;
        }
        .badge {
            display: inline-block; padding: 4px 14px; border-radius: 60px;
            font-size: 0.7rem; font-weight: 700;
        }
        .badge-win { background: #d1fae5; color: #065f46; }
        .badge-loss { background: #fee2e2; color: #991b1b; }
        .badge-wait { background: #fef3c7; color: #92400e; }
        /* Profil */
        .deposit-area {
            margin-top: 20px; padding-top: 16px; border-top: 1px solid #eef2ff;
            display: flex; gap: 12px;
        }
        .deposit-area input { flex: 2; padding: 12px; border-radius: 60px; border: 1px solid #cbd5e1; }
        .deposit-area button { flex: 1; background: #10b981; border: none; border-radius: 60px; color: white; font-weight: 700; cursor: pointer; }
        .nx-panel { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
        .nx-digit { background: #eef2ff; padding: 8px 18px; border-radius: 40px; cursor: pointer; font-weight: 700; }
        .error-msg { color: #dc2626; font-size: 0.75rem; margin-top: 8px; text-align: center; }
        .empty-msg { text-align: center; color: #6c7a91; padding: 20px; }
        /* Animation de gain */
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .win-animation {
            animation: bounce 0.5s ease;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1><i class="fas fa-dice-d6"></i> LOTATO · Joueur</h1>
        <div class="balance-row">
            <span><i class="fas fa-coins"></i> Mon solde</span>
            <span class="balance" id="headerBalance">0 G</span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
    </div>

    <!-- Carrousel publicitaire -->
    <div class="carousel-container" id="carouselContainer" style="display: none;">
        <div class="carousel-slides" id="carouselSlides"></div>
    </div>
    <div class="carousel-text" id="announcementText" style="display: none;"></div>

    <div class="tabs">
        <div class="tab active" data-tab="play"><i class="fas fa-gamepad"></i> Jouer</div>
        <div class="tab" data-tab="history"><i class="fas fa-receipt"></i> Tickets</div>
        <div class="tab" data-tab="results"><i class="fas fa-trophy"></i> Résultats</div>
        <div class="tab" data-tab="profile"><i class="fas fa-user-circle"></i> Profil</div>
    </div>

    <div id="playScreen" class="screen active">
        <div class="card">
            <div style="font-weight:700; margin-bottom:10px;"><i class="fas fa-calendar-alt"></i> Tirage actif</div>
            <div class="draws-scroll" id="drawsList"></div>
            <div id="drawsError" class="error-msg" style="display:none;"></div>
        </div>
        <div class="card">
            <div style="font-weight:700; margin-bottom:14px;"><i class="fas fa-dice"></i> Choisissez votre jeu</div>
            <div class="game-category"><div class="category-title">🎯 Borlette</div><div class="sub-buttons"><button class="game-btn" data-game="borlette">Borlette</button></div></div>
            <div class="game-category"><div class="category-title">🎲 Lotto</div><div class="sub-buttons"><button class="sub-btn" data-game="lotto3">Lotto3</button><button class="sub-btn" data-game="lotto4">Lotto4</button><button class="sub-btn" data-game="lotto5">Lotto5</button><button class="sub-btn auto-chip" data-game="auto_lotto4">Auto Lotto4</button><button class="sub-btn auto-chip" data-game="auto_lotto5">Auto Lotto5</button></div></div>
            <div class="game-category"><div class="category-title">💍 Mariage</div><div class="sub-buttons"><button class="sub-btn" data-game="mariage">Mariage</button><button class="sub-btn auto-chip" data-game="auto_marriage">Auto Mariage</button></div></div>
            <div class="game-category"><div class="category-title">✨ Spéciaux</div><div class="sub-buttons"><button class="sub-btn" data-game="bo">BO</button><button class="sub-btn" data-game="grap">GRAP</button><button class="sub-btn" data-game="nx">Nx</button></div></div>
            <div id="optionsPanel" class="options-panel"></div>
            <div id="nxPanel" class="nx-panel" style="display:none;"></div>
            <div class="bet-row">
                <input type="text" id="betNumber" placeholder="Numéro" autocomplete="off">
                <input type="number" id="betAmount" placeholder="Montant G" autocomplete="off">
                <button class="btn-add-icon" id="addBtn">+</button>
            </div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between;"><span><strong><i class="fas fa-shopping-cart"></i> Panier</strong> (<span id="cartCount">0</span>)</span><button id="clearCartBtn" style="background:#ef4444; padding:6px 18px; border-radius:40px; border:none; color:white;">Vider</button></div>
            <div class="cart-items" id="cartList"></div>
            <div class="cart-total">Total : <span id="cartTotal">0</span> G</div>
            <button id="confirmBtn" class="btn-confirm"><i class="fas fa-check-circle"></i> Confirmer et acheter</button>
        </div>
    </div>

    <div id="historyScreen" class="screen"><div id="historyContainer" class="empty-msg">Chargement...</div></div>
    <div id="resultsScreen" class="screen"><div id="resultsContainer" class="empty-msg">Chargement...</div></div>
    <div id="profileScreen" class="screen">
        <div class="card">
            <p><i class="fas fa-user"></i> <strong>Nom :</strong> <span id="profileName"></span></p>
            <p><i class="fas fa-phone-alt"></i> <strong>Téléphone :</strong> <span id="profilePhone"></span></p>
            <div class="deposit-area">
                <input type="text" id="rechargeCode" placeholder="Code de recharge">
                <button id="rechargeBtn"><i class="fas fa-donate"></i> Recharger</button>
            </div>
            <div style="margin-top:18px; font-weight:700;"><i class="fas fa-wallet"></i> Solde : <span id="profileBalance" style="color:#10b981;">0 G</span></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin + '/api';
    let token = localStorage.getItem('auth_token');
    let playerId = localStorage.getItem('player_id');
    if (!token || !playerId) window.location.href = 'index.html';

    let App = {
        selectedDrawId: null,
        selectedDrawName: "",
        cart: [],
        selectedGame: "borlette",
        lotto4Options: [true, true, true],
        lotto5Options: [true, true],
        playerBalance: 0,
        globalLimits: {},
        blockedNumbers: [],
        draws: []
    };

    // ----- Carrousel et annonces -----
    let carouselInterval = null;
    let currentSlide = 0;
    let adsImages = [];
    let announcement = "";

    async function loadCarouselAndAnnouncement() {
        try {
            const settings = await apiFetch('/player/settings');
            adsImages = settings.adsImages || [];
            announcement = settings.announcements || "";
            const carouselDiv = document.getElementById('carouselContainer');
            const slidesDiv = document.getElementById('carouselSlides');
            const textDiv = document.getElementById('announcementText');
            if (adsImages.length > 0) {
                carouselDiv.style.display = 'block';
                slidesDiv.innerHTML = adsImages.map(url => `<div class="carousel-slide"><img src="${url}" alt="pub"></div>`).join('');
                if (carouselInterval) clearInterval(carouselInterval);
                carouselInterval = setInterval(() => {
                    currentSlide = (currentSlide + 1) % adsImages.length;
                    slidesDiv.style.transform = `translateX(-${currentSlide * 100}%)`;
                }, 4000);
            } else {
                carouselDiv.style.display = 'none';
            }
            if (announcement && announcement.trim() !== "") {
                textDiv.style.display = 'block';
                textDiv.innerText = announcement;
            } else {
                textDiv.style.display = 'none';
            }
        } catch(e) { console.error(e); }
    }

    // ----- Animation gain/perte -----
    function showWinAnimation(amount) {
        canvasConfetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#10b981', '#fbbf24'] });
        const msg = document.createElement('div');
        msg.innerText = `🎉 GAGNÉ ${amount} G ! 🎉`;
        msg.style.position = 'fixed';
        msg.style.top = '30%';
        msg.style.left = '50%';
        msg.style.transform = 'translate(-50%, -50%)';
        msg.style.backgroundColor = '#10b981';
        msg.style.color = 'white';
        msg.style.padding = '15px 25px';
        msg.style.borderRadius = '60px';
        msg.style.fontWeight = 'bold';
        msg.style.zIndex = '9999';
        msg.style.boxShadow = '0 0 20px rgba(0,0,0,0.3)';
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 2500);
    }
    function showLossAnimation() {
        document.body.style.animation = 'shake 0.3s ease-in-out 0s 2';
        setTimeout(() => { document.body.style.animation = ''; }, 600);
        const msg = document.createElement('div');
        msg.innerText = '😞 Pas de chance...';
        msg.style.position = 'fixed';
        msg.style.top = '30%';
        msg.style.left = '50%';
        msg.style.transform = 'translate(-50%, -50%)';
        msg.style.backgroundColor = '#ef4444';
        msg.style.color = 'white';
        msg.style.padding = '15px 25px';
        msg.style.borderRadius = '60px';
        msg.style.fontWeight = 'bold';
        msg.style.zIndex = '9999';
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 2000);
    }
    // Ajout de l'animation shake
    const styleShake = document.createElement('style');
    styleShake.textContent = `@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }`;
    document.head.appendChild(styleShake);

    // ----- API -----
    async function apiFetch(endpoint, options = {}) {
        const res = await fetch(`${API_BASE}${endpoint}`, {
            ...options,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
        });
        if (res.status === 401) { localStorage.clear(); window.location.href = 'index.html'; throw new Error('Session expirée'); }
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erreur serveur');
        return data;
    }

    async function refreshBalance() {
        try {
            const data = await apiFetch('/player/balance');
            App.playerBalance = data.balance;
            document.getElementById('headerBalance').innerText = App.playerBalance.toLocaleString() + " G";
            document.getElementById('profileBalance').innerHTML = App.playerBalance.toLocaleString() + " G";
        } catch(e) { console.error(e); }
    }

    async function loadDraws() {
        try {
            const data = await apiFetch('/draws');
            App.draws = data.draws;
            const container = document.getElementById('drawsList');
            const errorDiv = document.getElementById('drawsError');
            if (!App.draws.length) {
                container.innerHTML = '';
                errorDiv.style.display = 'block';
                errorDiv.innerText = 'Aucun tirage disponible';
                return;
            }
            errorDiv.style.display = 'none';
            container.innerHTML = App.draws.map(d => `
                <div class="draw-chip ${App.selectedDrawId === d.id ? 'active' : ''} ${!d.active ? 'disabled' : ''}" 
                     data-id="${d.id}" data-name="${d.name}" data-active="${d.active}">
                    ${d.name} (${d.time.substring(0,5)}) ${!d.active ? '🔒' : ''}
                </div>
            `).join('');
            document.querySelectorAll('.draw-chip').forEach(el => {
                el.addEventListener('click', () => {
                    const active = el.dataset.active === 'true';
                    if (!active) { alert("Tirage fermé (7 minutes avant l'heure)"); return; }
                    App.selectedDrawId = parseInt(el.dataset.id);
                    App.selectedDrawName = el.dataset.name;
                    loadDraws();
                });
            });
            if (!App.selectedDrawId && App.draws.length) {
                const firstActive = App.draws.find(d => d.active);
                if (firstActive) {
                    App.selectedDrawId = firstActive.id;
                    App.selectedDrawName = firstActive.name;
                    loadDraws();
                }
            }
        } catch(e) {
            console.error(e);
            document.getElementById('drawsError').innerText = 'Erreur chargement tirages';
            document.getElementById('drawsError').style.display = 'block';
        }
    }

    async function loadSettingsAndLimits() {
        try {
            const settings = await apiFetch('/player/settings');
            App.globalLimits = settings.globalLimits || {};
            App.blockedNumbers = settings.blockedNumbers || [];
        } catch(e) { console.error(e); }
    }

    // ----- Gestion des paris (inchangée mais adaptée) -----
    function generateAutoBets(game, amount, nxDigit = null) {
        let bets = [];
        if (game === 'bo') {
            for (let i=0;i<=9;i++) bets.push({ game:'borlette', cleanNumber:i+''+i, displayNumber:i+''+i, amount });
        } else if (game === 'grap') {
            for (let i=0;i<=9;i++) bets.push({ game:'lotto3', cleanNumber:i+''+i+''+i, displayNumber:i+''+i+''+i, amount });
        } else if (game === 'nx' && nxDigit !== null) {
            for (let t=0;t<=9;t++) bets.push({ game:'borlette', cleanNumber:t+''+nxDigit, displayNumber:t+''+nxDigit, amount });
        } else if (game === 'auto_marriage') {
            const borlettes = App.cart.filter(b => b.game === 'borlette' && b.cleanNumber.length===2).map(b=>b.cleanNumber);
            const uniq = [...new Set(borlettes)];
            for(let i=0;i<uniq.length;i++) for(let j=i+1;j<uniq.length;j++) bets.push({ game:'mariage', cleanNumber:uniq[i]+'&'+uniq[j], displayNumber:uniq[i]+'&'+uniq[j], amount });
        } else if (game === 'auto_lotto4') {
            const borlettes = App.cart.filter(b => b.game === 'borlette' && b.cleanNumber.length===2).map(b=>b.cleanNumber);
            const uniq = [...new Set(borlettes)];
            for(let i=0;i<uniq.length;i++) for(let j=0;j<uniq.length;j++) if(i!==j) bets.push({ game:'lotto4', cleanNumber:uniq[i]+uniq[j], displayNumber:uniq[i]+'-'+uniq[j], amount });
        } else if (game === 'auto_lotto5') {
            const lotto3s = App.cart.filter(b => b.game === 'lotto3' && b.cleanNumber.length===3).map(b=>b.cleanNumber);
            const uniq = [...new Set(lotto3s)];
            for(let i=0;i<uniq.length;i++) for(let j=0;j<uniq.length;j++) if(i!==j) bets.push({ game:'lotto5', cleanNumber:uniq[i]+uniq[j].slice(-2), displayNumber:uniq[i]+'-'+uniq[j].slice(-2), amount });
        }
        return bets;
    }

    let pendingNxDigit = null;

    function addBet() {
        if (!App.selectedDrawId) { alert("Sélectionnez un tirage actif"); return; }
        let rawNumber = document.getElementById('betNumber').value.trim();
        let amount = parseFloat(document.getElementById('betAmount').value);
        if (isNaN(amount) || amount <= 0) { alert("Montant valide requis"); return; }
        let game = App.selectedGame;
        let currentTotal = App.cart.reduce((s,b)=>s+b.amount,0) + amount;
        if (currentTotal > App.playerBalance) { alert(`Solde insuffisant. Vous avez ${App.playerBalance} G.`); return; }

        const checkGlobalLimit = (num2d) => {
            let limit = App.globalLimits[num2d];
            if (limit) {
                let already = App.cart.filter(b => b.game==='borlette' && b.cleanNumber===num2d).reduce((s,b)=>s+b.amount,0);
                if (already + amount > limit) { alert(`Limite atteinte pour ${num2d} : max ${limit} G`); return false; }
            }
            return true;
        };

        let clean = rawNumber.replace(/[^0-9&]/g, '');

        if (['bo','grap','auto_marriage','auto_lotto4','auto_lotto5'].includes(game)) {
            let autoBets = generateAutoBets(game, amount);
            if (autoBets.length===0) { alert("Aucune combinaison générée"); return; }
            for(let bet of autoBets) App.cart.push({ id:Date.now()+Math.random(), game:bet.game, cleanNumber:bet.cleanNumber, displayNumber:bet.displayNumber, amount:bet.amount });
            renderCart();
            document.getElementById('betNumber').value = '';
            document.getElementById('betAmount').value = '';
            return;
        }
        if (game === 'nx') {
            if (pendingNxDigit === null) { alert("Choisissez un chiffre Nx (0-9)"); return; }
            let autoBets = generateAutoBets('nx', amount, pendingNxDigit);
            for(let bet of autoBets) App.cart.push({ id:Date.now()+Math.random(), game:bet.game, cleanNumber:bet.cleanNumber, displayNumber:bet.displayNumber, amount:bet.amount });
            renderCart();
            document.getElementById('betNumber').value = '';
            document.getElementById('betAmount').value = '';
            pendingNxDigit = null;
            document.getElementById('nxPanel').style.display = 'none';
            return;
        }

        if (game === 'borlette') {
            if (!/^\d{2}$/.test(clean)) { alert("Borlette : 2 chiffres"); return; }
            if (App.blockedNumbers.includes(clean)) { alert(`Numéro ${clean} bloqué`); return; }
            if (!checkGlobalLimit(clean)) return;
            App.cart.push({ id:Date.now()+Math.random(), game, cleanNumber:clean, displayNumber:clean, amount });
        } else if (game === 'lotto3') {
            if (!/^\d{3}$/.test(clean)) { alert("Lotto3 : 3 chiffres"); return; }
            App.cart.push({ id:Date.now()+Math.random(), game, cleanNumber:clean, displayNumber:clean, amount });
        } else if (game === 'lotto4') {
            if (!/^\d{4}$/.test(clean)) { alert("Lotto4 : 4 chiffres"); return; }
            const opts = App.lotto4Options;
            if (!opts[0] && !opts[1] && !opts[2]) { alert("Choisissez au moins une option Lotto4"); return; }
            for(let i=0;i<opts.length;i++) if(opts[i]) App.cart.push({ id:Date.now()+Math.random(), game, cleanNumber:clean, displayNumber:clean.slice(0,2)+'-'+clean.slice(2,4), amount, option:i+1 });
        } else if (game === 'lotto5') {
            if (!/^\d{5}$/.test(clean)) { alert("Lotto5 : 5 chiffres"); return; }
            const opts = App.lotto5Options;
            if (!opts[0] && !opts[1]) { alert("Choisissez au moins une option Lotto5"); return; }
            for(let i=0;i<opts.length;i++) if(opts[i]) App.cart.push({ id:Date.now()+Math.random(), game, cleanNumber:clean, displayNumber:clean.slice(0,3)+'-'+clean.slice(3,5), amount, option:i+1 });
        } else if (game === 'mariage') {
            if (!/^\d{2}&\d{2}$/.test(clean)) { alert("Mariage : format 12&34"); return; }
            App.cart.push({ id:Date.now()+Math.random(), game, cleanNumber:clean, displayNumber:clean, amount });
        } else { alert("Jeu non reconnu"); return; }
        renderCart();
        document.getElementById('betNumber').value = '';
        document.getElementById('betAmount').value = '';
    }

    function renderCart() {
        const container = document.getElementById('cartList');
        let total = 0;
        container.innerHTML = '';
        App.cart.forEach((item, idx) => {
            total += item.amount;
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `<span><strong>${item.game.toUpperCase()}</strong> ${item.displayNumber}</span><span>${item.amount} G</span><button data-idx="${idx}" class="removeCartItem" style="background:#ef4444; padding:4px 12px; border-radius:40px;">✖</button>`;
            container.appendChild(div);
        });
        document.getElementById('cartTotal').innerText = total;
        document.getElementById('cartCount').innerText = App.cart.length;
        document.querySelectorAll('.removeCartItem').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                App.cart.splice(idx, 1);
                renderCart();
            });
        });
    }

    async function checkout() {
        if (!App.selectedDrawId) { alert("Choisissez un tirage"); return; }
        if (App.cart.length === 0) { alert("Panier vide"); return; }
        const total = App.cart.reduce((s,b)=>s+b.amount,0);
        if (App.playerBalance < total) { alert("Solde insuffisant"); return; }
        const bets = App.cart.map(b => ({ game: b.game, number: b.cleanNumber, amount: b.amount, option: b.option || null }));
        try {
            const data = await apiFetch('/player/tickets/save', {
                method: 'POST',
                body: JSON.stringify({ drawId: App.selectedDrawId, drawName: App.selectedDrawName, bets, totalAmount: total })
            });
            if (data.success) {
                App.cart = [];
                renderCart();
                await refreshBalance();
                alert(`✅ Achat validé ! ${total} G débités. Ticket #${data.ticketId}`);
                loadHistory();
            } else alert("Erreur achat");
        } catch (err) { alert("Erreur: " + err.message); }
    }

    async function loadHistory() {
        const container = document.getElementById('historyContainer');
        try {
            const data = await apiFetch('/player/tickets');
            const tickets = data.tickets;
            if (!tickets || !tickets.length) { container.innerHTML = '<div class="empty-msg">Aucun ticket pour le moment</div>'; return; }
            container.innerHTML = tickets.map(t => {
                const win = t.win_amount || 0;
                let status = !t.checked ? '<span class="badge badge-wait">En attente</span>' : (win > 0 ? `<span class="badge badge-win">Gagné ${win} G</span>` : '<span class="badge badge-loss">Perdu</span>');
                const preview = (t.bets || []).slice(0,2).map(b => `${b.game} ${b.number}`).join(', ');
                return `<div class="history-card"><div><strong>${t.draw_name}</strong> ${status}</div><div style="font-size:0.75rem;">📅 ${new Date(t.date).toLocaleString()}</div><div>🎲 ${preview} | Total: ${t.total_amount} G</div>${win>0?`<div style="color:#10b981;">💰 Gain: ${win} G</div>`:''}</div>`;
            }).join('');
            // Vérifier si on doit afficher animation (si ticket vient d'être consulté avec win)
            // Pour l'exemple, on ne le fait pas ici car c'est au chargement.
        } catch(e) {
            console.error(e);
            container.innerHTML = '<div class="empty-msg">Erreur chargement des tickets</div>';
        }
    }

    async function loadResults() {
        const container = document.getElementById('resultsContainer');
        try {
            const data = await apiFetch('/winners/results');
            const results = data.results;
            if (!results.length) { container.innerHTML = '<div class="empty-msg">Aucun résultat publié</div>'; return; }
            container.innerHTML = results.map(r => `<div class="result-card"><div><strong>${r.name}</strong> <small>${new Date(r.date).toLocaleDateString()}</small></div><div style="font-family:monospace;">🎯 ${r.numbers[0]} - ${r.numbers[1]} - ${r.numbers[2]} | Lotto3: ${r.lotto3}</div></div>`).join('');
        } catch(e) {
            console.error(e);
            container.innerHTML = '<div class="empty-msg">Erreur chargement des résultats</div>';
        }
    }

    async function rechargeWithCode() {
        const code = document.getElementById('rechargeCode').value.trim();
        if (!code) { alert("Code requis"); return; }
        try {
            const data = await apiFetch('/player/recharge/code', { method: 'POST', body: JSON.stringify({ code }) });
            if (data.success) { alert(`Recharge de ${data.amount} G effectuée !`); await refreshBalance(); document.getElementById('rechargeCode').value = ''; }
            else alert(data.error || "Code invalide");
        } catch(e) { alert("Erreur: " + e.message); }
    }

    function initGameSelectors() {
        document.querySelectorAll('.game-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                App.selectedGame = btn.dataset.game;
                document.querySelectorAll('.game-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                updateOptionsAndInput();
            });
        });
        document.querySelectorAll('.sub-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const game = btn.dataset.game;
                if (game === 'nx') {
                    const panel = document.getElementById('nxPanel');
                    if (panel.style.display === 'flex') { panel.style.display = 'none'; return; }
                    panel.innerHTML = '';
                    for (let d=0; d<=9; d++) {
                        const digitDiv = document.createElement('div');
                        digitDiv.className = 'nx-digit';
                        digitDiv.innerText = d;
                        digitDiv.onclick = () => {
                            pendingNxDigit = d;
                            App.selectedGame = `n${d}`;
                            panel.style.display = 'none';
                            alert(`Jeu N${d} sélectionné : tous les numéros se terminant par ${d}`);
                        };
                        panel.appendChild(digitDiv);
                    }
                    panel.style.display = 'flex';
                    return;
                }
                App.selectedGame = game;
                document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.game-btn').forEach(b=>b.classList.remove('active'));
                updateOptionsAndInput();
            });
        });
        document.querySelector('.game-btn').classList.add('active');
        App.selectedGame = 'borlette';
        updateOptionsAndInput();
    }

    function updateOptionsAndInput() {
        const panel = document.getElementById('optionsPanel');
        const numInput = document.getElementById('betNumber');
        document.getElementById('nxPanel').style.display = 'none';
        pendingNxDigit = null;

        if (App.selectedGame === 'lotto4') {
            panel.innerHTML = `<div class="option-chip ${App.lotto4Options[0]?'active':''}" data-opt="0">Opt1 (12&34)</div>
                               <div class="option-chip ${App.lotto4Options[1]?'active':''}" data-opt="1">Opt2 (23&45)</div>
                               <div class="option-chip ${App.lotto4Options[2]?'active':''}" data-opt="2">Opt3 (13&46)</div>`;
            document.querySelectorAll('.option-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    let idx = parseInt(chip.dataset.opt);
                    App.lotto4Options[idx] = !App.lotto4Options[idx];
                    updateOptionsAndInput();
                });
            });
        } else if (App.selectedGame === 'lotto5') {
            panel.innerHTML = `<div class="option-chip ${App.lotto5Options[0]?'active':''}" data-opt="0">Opt1 (123&45)</div>
                               <div class="option-chip ${App.lotto5Options[1]?'active':''}" data-opt="1">Opt2 (123&46)</div>`;
            document.querySelectorAll('.option-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    let idx = parseInt(chip.dataset.opt);
                    App.lotto5Options[idx] = !App.lotto5Options[idx];
                    updateOptionsAndInput();
                });
            });
        } else {
            panel.innerHTML = '';
        }

        if (['bo','grap','auto_marriage','auto_lotto4','auto_lotto5','nx'].includes(App.selectedGame) || App.selectedGame.startsWith('n')) {
            numInput.disabled = true;
            numInput.placeholder = 'Auto';
        } else {
            numInput.disabled = false;
            if (App.selectedGame === 'lotto3') numInput.maxLength = 3;
            else if (App.selectedGame === 'lotto4') numInput.maxLength = 4;
            else if (App.selectedGame === 'lotto5') numInput.maxLength = 5;
            else if (App.selectedGame === 'borlette') numInput.maxLength = 2;
            else if (App.selectedGame === 'mariage') numInput.maxLength = 4;
            else numInput.maxLength = 10;
            numInput.placeholder = 'Numéro';
        }
    }

    function setupAutoFocus() {
        const numInput = document.getElementById('betNumber');
        const amtInput = document.getElementById('betAmount');
        numInput.addEventListener('input', () => {
            let maxLen = 2;
            if (App.selectedGame === 'lotto3') maxLen = 3;
            else if (App.selectedGame === 'lotto4') maxLen = 4;
            else if (App.selectedGame === 'lotto5') maxLen = 5;
            else if (App.selectedGame === 'borlette') maxLen = 2;
            else if (App.selectedGame === 'mariage') maxLen = 4;
            if (maxLen > 0 && numInput.value.length >= maxLen) amtInput.focus();
        });
        amtInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addBet(); });
    }

    async function refreshProfile() {
        document.getElementById('profileName').innerText = localStorage.getItem('player_name') || '';
        document.getElementById('profilePhone').innerText = localStorage.getItem('player_phone') || '';
        await refreshBalance();
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    // --- Event listeners tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`${target}Screen`).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (target === 'history') loadHistory();
            if (target === 'results') loadResults();
            if (target === 'profile') refreshProfile();
        });
    });

    document.getElementById('addBtn').addEventListener('click', addBet);
    document.getElementById('confirmBtn').addEventListener('click', checkout);
    document.getElementById('clearCartBtn').addEventListener('click', () => { App.cart = []; renderCart(); });
    document.getElementById('rechargeBtn').addEventListener('click', rechargeWithCode);
    document.getElementById('logoutBtn').addEventListener('click', logout);

    (async function init() {
        await refreshProfile();
        await loadDraws();
        await loadSettingsAndLimits();
        await loadCarouselAndAnnouncement();
        initGameSelectors();
        setupAutoFocus();
        // On charge history et results en arrière-plan
        loadHistory();
        loadResults();
    })();
</script>
</body>
</html>
