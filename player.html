<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTATO PRO - Joueur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        body{background:#0a0b1e;color:#fff;padding:10px;}
        .app{max-width:500px;margin:auto;}
        header{background:#1a1c3a;padding:10px;display:flex;justify-content:space-between;border-radius:10px;}
        .tabs{display:flex;gap:5px;margin:10px 0;}
        .tab{flex:1;background:#1a1c3a;border:none;padding:8px;border-radius:8px;color:#fff;cursor:pointer;}
        .tab.active{background:#ad00f1;}
        .tab-content{display:none;background:#0f1122;padding:10px;border-radius:10px;}
        .tab-content.active{display:block;}
        .draw-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
        .draw-card{background:#1a1c3a;padding:8px;border-radius:8px;text-align:center;cursor:pointer;}
        .draw-card.selected{background:#00d4ff;color:#000;}
        .input-group{display:flex;gap:8px;margin:10px 0;}
        input{padding:8px;border-radius:6px;border:none;background:#1a1c3a;color:#fff;flex:1;}
        button{background:#ad00f1;border:none;padding:8px 16px;border-radius:8px;color:#fff;cursor:pointer;}
        .cart-item{display:flex;justify-content:space-between;background:#1a1c3a;margin:5px 0;padding:5px;border-radius:6px;}
        .recharge-btn{background:#00d4ff;color:#000;width:100%;margin:5px 0;}
        .code-input{display:flex;gap:5px;margin:5px 0;}
        .login-container{background:#0a0b1e;min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .login-card{background:#1a1c3a;padding:20px;border-radius:20px;width:300px;text-align:center;}
        .login-card input{width:100%;margin:8px 0;}
        .toggle-link{color:#00d4ff;cursor:pointer;margin-top:10px;display:block;}
    </style>
</head>
<body>
<div id="app">
    <!-- Login -->
    <div id="login-screen" class="login-container">
        <div class="login-card">
            <h2>LOTATO PRO</h2>
            <div id="login-error" style="color:red;"></div>
            <input type="text" id="login-phone" placeholder="Téléphone">
            <input type="password" id="login-password" placeholder="Mot de passe">
            <button id="do-login">Connexion</button>
            <span id="show-register" class="toggle-link">Pas de compte ? Créer un compte</span>
        </div>
    </div>
    <div id="register-screen" class="login-container" style="display:none;">
        <div class="login-card">
            <h2>Inscription</h2>
            <div id="register-error" style="color:red;"></div>
            <input type="text" id="reg-name" placeholder="Nom">
            <input type="tel" id="reg-phone" placeholder="Téléphone">
            <input type="password" id="reg-password" placeholder="Mot de passe (min 4)">
            <input type="text" id="reg-zone" placeholder="Zone (option)">
            <button id="do-register">S'inscrire</button>
            <span id="show-login" class="toggle-link">Déjà un compte ? Se connecter</span>
        </div>
    </div>

    <!-- Dashboard joueur -->
    <div id="dashboard" style="display:none;">
        <header><span>LOTATO PRO</span><span><span id="player-name"></span> - <span id="balance">0 G</span></span></header>
        <div class="tabs">
            <button class="tab active" data-tab="play">Jouer</button>
            <button class="tab" data-tab="history">Historique</button>
            <button class="tab" data-tab="recharge">Recharge</button>
            <button class="tab" data-tab="wins">Gains</button>
        </div>
        <div id="play" class="tab-content active">
            <div id="draws-list" class="draw-grid">Chargement...</div>
            <div class="input-group">
                <input type="text" id="bet-number" placeholder="Numéro (00)" maxlength="2">
                <input type="number" id="bet-amount" placeholder="Montant">
                <button id="add-bet">Ajouter</button>
            </div>
            <div id="cart">Panier vide</div>
            <button id="validate-cart" style="width:100%; margin-top:8px;">Valider et payer</button>
        </div>
        <div id="history" class="tab-content">
            <input type="text" id="search-history" placeholder="Rechercher..." style="width:100%; margin-bottom:8px;">
            <div id="history-list"></div>
        </div>
        <div id="recharge" class="tab-content">
            <button id="show-recharge" class="recharge-btn">Afficher recharge par code</button>
            <div id="recharge-panel" style="display:none;">
                <div class="code-input"><input type="text" id="code-input" placeholder="Code"><button id="use-code">Utiliser</button></div>
            </div>
            <div id="transactions-list"></div>
        </div>
        <div id="wins" class="tab-content"><div id="wins-list"></div></div>
    </div>
</div>

<script>
    const API = 'https://lotato-lsvu.onrender.com/api';
    let token = localStorage.getItem('player_token') || localStorage.getItem('auth_token');
    let playerId = localStorage.getItem('player_id');
    let playerName = localStorage.getItem('player_name');
    let balance = 0;
    let draws = [];
    let currentDrawId = null;
    let cart = [];
    let tickets = [];

    // Utilitaires
    async function fetchAPI(url, options = {}) {
        const res = await fetch(API + url, {
            ...options,
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
        });
        if (res.status === 401) throw new Error('Non autorisé');
        return res.json();
    }

    async function loadBalance() {
        try {
            const data = await fetchAPI('/player/balance');
            balance = data.balance;
            document.getElementById('balance').innerText = balance.toLocaleString() + ' G';
        } catch(e) { console.error(e); }
    }

    async function loadDraws() {
        try {
            const data = await fetchAPI('/draws');
            draws = data.draws || [];
            renderDraws();
        } catch(e) { console.error(e); }
    }

    function renderDraws() {
        const container = document.getElementById('draws-list');
        if (!draws.length) { container.innerHTML = '<div>Aucun tirage</div>'; return; }
        if (!currentDrawId && draws.length) currentDrawId = draws[0].id;
        container.innerHTML = draws.map(d => `
            <div class="draw-card ${currentDrawId === d.id ? 'selected' : ''} ${!d.active ? 'blocked' : ''}" data-id="${d.id}" data-active="${d.active}">
                <strong>${d.name}</strong><br>${d.time}
                ${!d.active ? '<br><small>Fermé</small>' : ''}
            </div>
        `).join('');
        // Attacher clics
        document.querySelectorAll('.draw-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = parseInt(card.dataset.id);
                const active = card.dataset.active === 'true';
                if (active) {
                    currentDrawId = id;
                    renderDraws();
                    console.log('Tirage sélectionné:', id);
                } else {
                    alert('Ce tirage est fermé');
                }
            });
        });
    }

    function renderCart() {
        const container = document.getElementById('cart');
        if (!cart.length) {
            container.innerHTML = 'Panier vide';
            return;
        }
        let total = 0;
        container.innerHTML = cart.map((b, idx) => {
            total += b.amount;
            return `<div class="cart-item">${b.game} ${b.number} - ${b.amount} G <button data-idx="${idx}">✕</button></div>`;
        }).join('');
        // Ajouter une ligne total
        container.innerHTML += `<div style="margin-top:8px;"><strong>Total: ${total} G</strong></div>`;
        // Suppression
        document.querySelectorAll('.cart-item button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                cart.splice(idx, 1);
                renderCart();
            });
        });
    }

    function addBet() {
        if (!currentDrawId) { alert('Choisissez un tirage d\'abord'); return; }
        const amount = parseFloat(document.getElementById('bet-amount').value);
        const number = document.getElementById('bet-number').value.trim();
        if (isNaN(amount) || amount <= 0) { alert('Montant invalide'); return; }
        if (amount > balance) { alert('Solde insuffisant'); return; }
        if (!/^\d{2}$/.test(number)) { alert('Numéro à 2 chiffres (ex: 12)'); return; }
        cart.push({
            id: Date.now(),
            game: 'borlette',
            number: number,
            cleanNumber: number,
            amount: amount,
            drawId: currentDrawId
        });
        renderCart();
        document.getElementById('bet-number').value = '';
        document.getElementById('bet-amount').value = '';
        console.log('Panier:', cart);
    }

    async function validateCart() {
        if (!currentDrawId) { alert('Choisissez un tirage'); return; }
        if (!cart.length) { alert('Panier vide'); return; }
        const draw = draws.find(d => d.id === currentDrawId);
        if (!draw || !draw.active) { alert('Tirage fermé'); return; }
        const total = cart.reduce((s,b)=>s+b.amount,0);
        if (total > balance) { alert('Solde insuffisant'); return; }
        try {
            const res = await fetchAPI('/player/tickets/save', {
                method: 'POST',
                body: JSON.stringify({ drawId: currentDrawId, drawName: draw.name, bets: cart, total })
            });
            if (res.success) {
                alert('Ticket validé !');
                cart = [];
                renderCart();
                await loadBalance();
                await loadHistory();
                await loadTransactions();
                await loadWins();
            } else {
                alert('Erreur: ' + (res.error || ''));
            }
        } catch(e) { alert('Erreur réseau'); }
    }

    async function loadHistory() {
        try {
            const data = await fetchAPI('/player/tickets');
            tickets = data.tickets || [];
            renderHistory();
        } catch(e) { console.error(e); }
    }
    function renderHistory() {
        const container = document.getElementById('history-list');
        const search = document.getElementById('search-history').value.toLowerCase();
        let filtered = tickets;
        if (search) {
            filtered = tickets.filter(t => (t.ticket_id + ' ' + t.draw_name).toLowerCase().includes(search));
        }
        if (!filtered.length) { container.innerHTML = '<div>Aucun ticket</div>'; return; }
        container.innerHTML = filtered.map(t => `<div><strong>#${t.ticket_id}</strong> - ${t.draw_name} - ${t.total_amount} G ${t.win_amount ? `(+${t.win_amount} G)` : ''}</div>`).join('');
    }

    async function loadTransactions() {
        try {
            const data = await fetchAPI('/player/transactions');
            const list = data.transactions || [];
            const container = document.getElementById('transactions-list');
            if (!list.length) { container.innerHTML = '<div>Aucune transaction</div>'; return; }
            container.innerHTML = list.map(t => `<div>${new Date(t.created_at).toLocaleString()} - ${t.type} ${t.amount} G</div>`).join('');
        } catch(e) { console.error(e); }
    }

    async function loadWins() {
        try {
            const data = await fetchAPI('/player/tickets');
            const wins = (data.tickets || []).filter(t => parseFloat(t.win_amount) > 0);
            const container = document.getElementById('wins-list');
            if (!wins.length) { container.innerHTML = '<div>Aucun gain</div>'; return; }
            container.innerHTML = wins.map(t => `<div>${t.draw_name} - ${t.win_amount} G</div>`).join('');
        } catch(e) { console.error(e); }
    }

    async function useRechargeCode() {
        const code = document.getElementById('code-input').value;
        if (!code) { alert('Entrez un code'); return; }
        const res = await fetchAPI('/player/recharge/code', { method: 'POST', body: JSON.stringify({ code }) });
        if (res.success) {
            alert(`Recharge de ${res.amount} G effectuée`);
            await loadBalance();
            await loadTransactions();
            document.getElementById('code-input').value = '';
        } else {
            alert(res.error || 'Code invalide');
        }
    }

    // Tabs
    function setupTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tabId === 'history') loadHistory();
                if (tabId === 'recharge') loadTransactions();
                if (tabId === 'wins') loadWins();
            });
        });
    }

    // Initialisation du tableau de bord
    async function initDashboard() {
        document.getElementById('player-name').innerText = playerName;
        await loadDraws();
        await loadBalance();
        await loadHistory();
        await loadTransactions();
        await loadWins();
        setupTabs();
        document.getElementById('add-bet').addEventListener('click', addBet);
        document.getElementById('validate-cart').addEventListener('click', validateCart);
        document.getElementById('show-recharge').addEventListener('click', () => {
            const panel = document.getElementById('recharge-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        });
        document.getElementById('use-code').addEventListener('click', useRechargeCode);
        document.getElementById('search-history').addEventListener('input', renderHistory);
    }

    // Gestion authentification
    if (token && playerId) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('register-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        initDashboard();
    } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }

    // Événements login/register
    document.getElementById('do-login').addEventListener('click', async () => {
        const phone = document.getElementById('login-phone').value;
        const password = document.getElementById('login-password').value;
        const errDiv = document.getElementById('login-error');
        if (!phone || !password) { errDiv.innerText = 'Téléphone et mot de passe requis'; return; }
        try {
            const res = await fetch(API + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: phone, password })
            });
            const data = await res.json();
            if (data.success && data.role === 'player') {
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('player_token', data.token);
                localStorage.setItem('player_id', data.playerId);
                localStorage.setItem('player_name', data.name);
                window.location.reload();
            } else {
                errDiv.innerText = data.error || 'Identifiants incorrects';
            }
        } catch(e) { errDiv.innerText = 'Erreur réseau'; }
    });

    document.getElementById('do-register').addEventListener('click', async () => {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const password = document.getElementById('reg-password').value;
        const zone = document.getElementById('reg-zone').value;
        const errDiv = document.getElementById('register-error');
        if (!name || !phone || !password) { errDiv.innerText = 'Tous les champs obligatoires'; return; }
        if (password.length < 4) { errDiv.innerText = 'Mot de passe trop court'; return; }
        try {
            const res = await fetch(API + '/auth/player/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, password, zone })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('player_token', data.token);
                localStorage.setItem('player_id', data.playerId);
                localStorage.setItem('player_name', data.name);
                window.location.reload();
            } else {
                errDiv.innerText = data.error || 'Échec inscription';
            }
        } catch(e) { errDiv.innerText = 'Erreur réseau'; }
    });

    document.getElementById('show-register').addEventListener('click', () => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('register-screen').style.display = 'flex';
    });
    document.getElementById('show-login').addEventListener('click', () => {
        document.getElementById('register-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
    });
</script>
</body>
</html>
