<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOTATO PRO - Joueur</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body { background:#0a0b1e; color:#fff; }
        .app { max-width:500px; margin:0 auto; background:#0f1122; min-height:100vh; }
        header { background:linear-gradient(135deg,#1a1c3a,#0f1122); padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); }
        .logo h1 { font-size:1.3rem; background:linear-gradient(135deg,#ad00f1,#ff007a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .balance { background:rgba(0,241,144,0.2); padding:5px 12px; border-radius:20px; font-size:0.9rem; font-weight:bold; }
        .tabs { display:flex; background:#1a1c3a; padding:10px; gap:5px; }
        .tab { flex:1; background:rgba(255,255,255,0.05); border:none; padding:12px; border-radius:12px; color:#fff; font-weight:600; cursor:pointer; text-align:center; }
        .tab.active { background:linear-gradient(135deg,#ad00f1,#00d4ff); }
        .tab-content { display:none; padding:20px; }
        .tab-content.active { display:block; }
        .section-title { font-size:1.2rem; margin-bottom:15px; display:flex; align-items:center; gap:8px; }
        .draw-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
        .draw-card { background:rgba(255,255,255,0.05); border-radius:16px; padding:12px; text-align:center; cursor:pointer; border:1px solid transparent; }
        .draw-card.selected { border-color:#00d4ff; background:rgba(0,212,255,0.1); }
        .draw-card.blocked { opacity:0.5; cursor:not-allowed; }
        .game-selector { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
        .chip { background:rgba(255,255,255,0.1); border:none; padding:8px 16px; border-radius:30px; color:#fff; cursor:pointer; }
        .chip.active { background:linear-gradient(135deg,#ad00f1,#00d4ff); }
        .numeric-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px; }
        .lotto-options { display:flex; gap:10px; margin:10px 0; flex-wrap:wrap; }
        .option-chip { background:rgba(255,255,255,0.1); padding:5px 12px; border-radius:20px; cursor:pointer; }
        .option-chip.active { background:#00d4ff; color:#000; }
        .input-container { display:flex; gap:10px; margin:20px 0; }
        .input-container input { flex:1; padding:12px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; text-align:center; }
        .add-btn { background:linear-gradient(135deg,#ad00f1,#00d4ff); border:none; padding:12px 20px; border-radius:12px; color:#fff; font-weight:bold; cursor:pointer; }
        .cart-section { background:rgba(255,255,255,0.02); border-radius:20px; padding:15px; margin-top:20px; }
        .cart-header { display:flex; justify-content:space-between; margin-bottom:10px; }
        .cart-list { max-height:300px; overflow-y:auto; }
        .cart-item { display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .cart-item button { background:#ff4d4d; border:none; color:#fff; width:24px; height:24px; border-radius:50%; cursor:pointer; }
        .print-btn { background:#00d4ff; border:none; padding:10px; border-radius:30px; color:#000; font-weight:bold; width:100%; margin-top:10px; cursor:pointer; }
        .history-item, .transaction-item { display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid rgba(255,255,255,0.05); }
        .profit { color:#00f190; }
        .loss { color:#ff4d4d; }
        .recharge-btn { background:rgba(0,212,255,0.2); border:1px solid #00d4ff; padding:12px; border-radius:12px; width:100%; margin-bottom:10px; text-align:center; cursor:pointer; }
        .code-input { display:flex; gap:10px; margin-top:10px; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:#1e1f3a; border-radius:20px; padding:20px; width:80%; max-width:350px; text-align:center; }
        .login-container { display:flex; flex-direction:column; justify-content:center; min-height:100vh; padding:20px; background:#0a0b1e; }
        .login-card { background:rgba(255,255,255,0.05); border-radius:30px; padding:30px; text-align:center; }
        .login-card input { width:100%; padding:12px; margin:10px 0; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; }
        .toggle-link { color:#00d4ff; cursor:pointer; margin-top:15px; display:inline-block; }
        .error { color:#ff4d4d; margin-top:10px; }
        /* Carrousel */
        .carousel { position:relative; width:100%; overflow:hidden; margin-bottom:20px; border-radius:16px; background:rgba(0,0,0,0.3); }
        .carousel-inner { display:flex; transition:transform 0.5s ease; }
        .carousel-item { flex:0 0 100%; }
        .carousel-item img { width:100%; height:150px; object-fit:cover; }
        .carousel-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:white; border:none; padding:10px; cursor:pointer; z-index:10; }
        .carousel-btn.prev { left:10px; }
        .carousel-btn.next { right:10px; }
        .announcement-bar { background:rgba(255,193,7,0.2); border-left:4px solid #ffc107; padding:10px; margin-bottom:15px; border-radius:8px; font-size:0.9rem; }
    </style>
</head>
<body>
<div id="app">
    <!-- Page de connexion/inscription -->
    <div id="auth-container">
        <div class="login-container">
            <div class="login-card">
                <h1>LOTATO PRO</h1>
                <h2 id="auth-title">Connexion</h2>
                <div id="auth-message" class="error"></div>
                <form id="login-form">
                    <input type="tel" id="login-phone" placeholder="Numéro de téléphone" required>
                    <input type="password" id="login-password" placeholder="Mot de passe" required>
                    <button type="submit" class="add-btn" style="width:100%;">Se connecter</button>
                </form>
                <form id="register-form" style="display:none;">
                    <input type="text" id="reg-name" placeholder="Nom complet" required>
                    <input type="tel" id="reg-phone" placeholder="Numéro de téléphone" required>
                    <input type="password" id="reg-password" placeholder="Mot de passe" required>
                    <input type="text" id="reg-zone" placeholder="Zone (optionnel)">
                    <button type="submit" class="add-btn" style="width:100%;">S'inscrire</button>
                </form>
                <div><span id="toggle-auth" class="toggle-link">Pas de compte ? Créer un compte</span></div>
            </div>
        </div>
    </div>

    <!-- Interface principale joueur -->
    <div id="dashboard-container" style="display:none;">
        <header>
            <div class="logo"><h1 id="lottery-name">LOTATO PRO</h1></div>
            <div><span id="player-name"></span> <span class="balance" id="balance-display">0 G</span></div>
        </header>

        <!-- Bandeau d'annonce -->
        <div id="announcement-bar" class="announcement-bar" style="display:none;"></div>

        <!-- Carrousel publicitaire -->
        <div id="carousel" class="carousel" style="display:none;">
            <div class="carousel-inner" id="carousel-inner"></div>
            <button class="carousel-btn prev" onclick="prevSlide()">❮</button>
            <button class="carousel-btn next" onclick="nextSlide()">❯</button>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="play">🎲 Jouer</button>
            <button class="tab" data-tab="history">📜 Historique</button>
            <button class="tab" data-tab="recharge">💰 Recharger</button>
            <button class="tab" data-tab="wins">🏆 Gains</button>
        </div>

        <!-- Onglet Jouer -->
        <div id="play-tab" class="tab-content active">
            <div class="section-title">📅 Choisissez un tirage</div>
            <div class="draw-grid" id="draws-container"></div>

            <div class="section-title">🎮 Type de jeu</div>
            <div class="game-selector" id="game-types">
                <button class="chip active" data-game="borlette" onclick="selectMainGame('borlette')">Borlette</button>
                <button class="chip" data-game="lotto" onclick="selectMainGame('lotto')">Lotto</button>
                <button class="chip" data-game="special" onclick="selectMainGame('special')">Spéciaux</button>
                <button class="chip" onclick="toggleNumericChips()">NX</button>
            </div>
            <div id="numeric-chips" class="numeric-chips" style="display:none;">
                <button class="chip numeric-chip" onclick="selectGame('n0')">N0</button>
                <button class="chip numeric-chip" onclick="selectGame('n1')">N1</button>
                <button class="chip numeric-chip" onclick="selectGame('n2')">N2</button>
                <button class="chip numeric-chip" onclick="selectGame('n3')">N3</button>
                <button class="chip numeric-chip" onclick="selectGame('n4')">N4</button>
                <button class="chip numeric-chip" onclick="selectGame('n5')">N5</button>
                <button class="chip numeric-chip" onclick="selectGame('n6')">N6</button>
                <button class="chip numeric-chip" onclick="selectGame('n7')">N7</button>
                <button class="chip numeric-chip" onclick="selectGame('n8')">N8</button>
                <button class="chip numeric-chip" onclick="selectGame('n9')">N9</button>
            </div>
            <div id="lotto-games" style="display:none;">
                <button class="chip" onclick="selectGame('lotto3')">Lotto 3</button>
                <button class="chip" onclick="selectGame('lotto4')">Lotto 4</button>
                <button class="chip" onclick="selectGame('lotto5')">Lotto 5</button>
            </div>
            <div id="special-games" style="display:none;">
                <button class="chip" onclick="selectGame('bo')">BO</button>
                <button class="chip" onclick="selectGame('grap')">GRAP</button>
                <button class="chip" onclick="selectGame('mariage')">Mariage</button>
            </div>
            <div id="lotto4-options" class="lotto-options" style="display:none;">
                <div class="option-chip" data-option="1" onclick="toggleLottoOption(4,1)">Option 1</div>
                <div class="option-chip" data-option="2" onclick="toggleLottoOption(4,2)">Option 2</div>
                <div class="option-chip" data-option="3" onclick="toggleLottoOption(4,3)">Option 3</div>
            </div>
            <div id="lotto5-options" class="lotto-options" style="display:none;">
                <div class="option-chip" data-option="1" onclick="toggleLottoOption(5,1)">Option 1</div>
                <div class="option-chip" data-option="2" onclick="toggleLottoOption(5,2)">Option 2</div>
                <div class="option-chip" data-option="3" onclick="toggleLottoOption(5,3)">Option 3</div>
            </div>

            <div class="section-title">🎲 Votre pari</div>
            <div class="input-container">
                <input type="text" id="num-input" placeholder="00" maxlength="5">
                <input type="number" id="amt-input" placeholder="Montant (G)" step="1" min="1">
                <button id="add-bet-btn" class="add-btn"><i class="fas fa-plus"></i></button>
            </div>

            <div class="cart-section">
                <div class="cart-header"><span>Panier (<span id="items-count">0</span>)</span><span class="cart-total" id="cart-total-display">0 G</span></div>
                <div id="cart-display" class="cart-list"></div>
                <button onclick="validateTicket()" class="print-btn"><i class="fas fa-check"></i> Valider et payer</button>
            </div>
        </div>

        <!-- Onglet Historique -->
        <div id="history-tab" class="tab-content">
            <div id="history-container" class="cart-list"></div>
        </div>

        <!-- Onglet Recharge -->
        <div id="recharge-tab" class="tab-content">
            <button class="recharge-btn" onclick="showRechargeOptions()">💵 Recharger mon compte</button>
            <div id="recharge-options" style="display:none; margin-top:15px;">
                <button class="recharge-btn" onclick="rechargeWith('moncash')">MonCash</button>
                <button class="recharge-btn" onclick="rechargeWith('natcash')">NatCash</button>
                <div class="code-input"><input type="text" id="recharge-code" placeholder="Code de recharge"><button class="add-btn" onclick="useRechargeCode()">Utiliser code</button></div>
            </div>
            <div id="transactions-container" style="margin-top:20px;"><h3>Dernières transactions</h3><div id="transactions-list"></div></div>
        </div>

        <!-- Onglet Gains -->
        <div id="wins-tab" class="tab-content">
            <div id="wins-container" class="cart-list"></div>
        </div>
    </div>
</div>

<script>
    // ---------- État global ----------
    let authToken = localStorage.getItem('player_token');
    let playerId = null, playerName = null, playerPhone = null;
    let balance = 0;
    let draws = [];
    let currentDrawId = null;
    let currentCart = [];
    let selectedGame = 'borlette';
    let lotto4Options = [true, true, true];
    let lotto5Options = [true, true, true];
    let carouselImages = [];
    let carouselIndex = 0;

    // ---------- Authentification ----------
    if (authToken) initPlayerInterface();
    else {
        document.getElementById('auth-container').style.display = 'block';
        document.getElementById('dashboard-container').style.display = 'none';
    }

    document.getElementById('toggle-auth').addEventListener('click', () => {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const title = document.getElementById('auth-title');
        if (loginForm.style.display !== 'none') {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            title.innerText = 'Inscription';
            document.getElementById('toggle-auth').innerText = 'Déjà un compte ? Se connecter';
        } else {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            title.innerText = 'Connexion';
            document.getElementById('toggle-auth').innerText = 'Pas de compte ? Créer un compte';
        }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone = document.getElementById('login-phone').value;
        const password = document.getElementById('login-password').value;
        const msg = document.getElementById('auth-message');
        try {
            const res = await fetch(`${API_CONFIG.BASE_URL}/auth/player/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password })
            });
            const data = await res.json();
            if (data.success) {
                authToken = data.token;
                playerId = data.playerId;
                playerName = data.name;
                playerPhone = phone;
                balance = data.balance;
                localStorage.setItem('player_token', authToken);
                initPlayerInterface();
            } else { msg.innerText = data.error || 'Échec'; }
        } catch(err) { msg.innerText = 'Erreur réseau'; }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const password = document.getElementById('reg-password').value;
        const zone = document.getElementById('reg-zone').value;
        const msg = document.getElementById('auth-message');
        try {
            const res = await fetch(`${API_CONFIG.BASE_URL}/auth/player/register`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, password, zone })
            });
            const data = await res.json();
            if (data.success) {
                authToken = data.token;
                playerId = data.playerId;
                playerName = data.name;
                playerPhone = phone;
                balance = data.balance;
                localStorage.setItem('player_token', authToken);
                initPlayerInterface();
            } else { msg.innerText = data.error || 'Échec inscription'; }
        } catch(err) { msg.innerText = 'Erreur réseau'; }
    });

    async function initPlayerInterface() {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('dashboard-container').style.display = 'block';
        document.getElementById('player-name').innerText = playerName;
        await loadDraws();
        await updateBalance();
        await loadPlayerHistory();
        await loadTransactions();
        await loadWins();
        await loadSettingsAndAds();
        await loadLimitsAndBlocks();
        setupTabs();
        document.getElementById('add-bet-btn').addEventListener('click', addBet);
        document.getElementById('amt-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') addBet(); });
    }

    async function loadSettingsAndAds() {
        try {
            const res = await fetch(`${API_CONFIG.BASE_URL}/player/settings`, { headers: { 'Authorization': `Bearer ${authToken}` } });
            const data = await res.json();
            document.getElementById('lottery-name').innerHTML = data.name || 'LOTATO PRO';
            carouselImages = data.adsImages || [];
            if (carouselImages.length > 0) {
                const carouselDiv = document.getElementById('carousel');
                const inner = document.getElementById('carousel-inner');
                inner.innerHTML = carouselImages.map(img => `<div class="carousel-item"><img src="${img}" alt="pub"></div>`).join('');
                carouselDiv.style.display = 'block';
                startCarousel();
            } else {
                document.getElementById('carousel').style.display = 'none';
            }
            const announcement = data.announcements;
            const annBar = document.getElementById('announcement-bar');
            if (announcement) {
                annBar.innerHTML = `<i class="fas fa-bullhorn"></i> ${announcement}`;
                annBar.style.display = 'block';
            } else annBar.style.display = 'none';
        } catch(e) { console.error(e); }
    }

    function startCarousel() {
        if (carouselImages.length <= 1) return;
        setInterval(() => { nextSlide(); }, 5000);
    }
    function prevSlide() {
        const inner = document.getElementById('carousel-inner');
        if (!inner) return;
        carouselIndex = (carouselIndex - 1 + carouselImages.length) % carouselImages.length;
        inner.style.transform = `translateX(-${carouselIndex * 100}%)`;
    }
    function nextSlide() {
        const inner = document.getElementById('carousel-inner');
        if (!inner) return;
        carouselIndex = (carouselIndex + 1) % carouselImages.length;
        inner.style.transform = `translateX(-${carouselIndex * 100}%)`;
    }

    async function loadLimitsAndBlocks() {
        try {
            const res = await fetch(`${API_CONFIG.BASE_URL}/player/limits`, { headers: { 'Authorization': `Bearer ${authToken}` } });
            const data = await res.json();
            window.globalLimits = data.globalLimits;
            window.drawLimits = data.drawLimits;
            window.globalBlocked = data.globalBlocked;
            window.drawBlocked = data.drawBlocked;
            window.lotto3Blocked = data.lotto3Blocked;
        } catch(e) { console.error(e); }
    }

    async function updateBalance() {
        try {
            const res = await fetch(`${API_CONFIG.BASE_URL}/player/balance`, { headers: { 'Authorization': `Bearer ${authToken}` } });
            const data = await res.json();
            balance = data.balance;
            document.getElementById('balance-display').innerHTML = balance.toLocaleString() + ' G';
        } catch(e) { console.error(e); }
    }

    async function loadDraws() {
        const res = await fetch(`${API_CONFIG.BASE_URL}/draws`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        const data = await res.json();
        draws = data.draws || [];
        if (draws.length) { currentDrawId = draws[0].id; renderDraws(); }
    }

    function renderDraws() {
        const container = document.getElementById('draws-container');
        if (!draws.length) { container.innerHTML = '<div class="empty-msg">Aucun tirage</div>'; return; }
        container.innerHTML = draws.map(d => `
            <div class="draw-card ${currentDrawId === d.id ? 'selected' : ''} ${!d.active ? 'blocked' : ''}" onclick="${d.active ? `selectDraw(${d.id})` : ''}">
                <div class="draw-name">${d.name}</div>
                <div class="draw-time">${d.time}</div>
                ${!d.active ? '<div style="font-size:0.7rem; color:#ff4d4d;">Fermé</div>' : ''}
            </div>
        `).join('');
    }

    function selectDraw(id) {
        const draw = draws.find(d => d.id === id);
        if (!draw.active) { alert('Ce tirage est fermé (2 minutes avant ou passé)'); return; }
        currentDrawId = id;
        renderDraws();
    }

    // ---------- Jeux ----------
    function selectMainGame(game) {
        document.querySelectorAll('#game-types .chip').forEach(c => c.classList.remove('active'));
        document.querySelector(`#game-types .chip[data-game="${game}"]`).classList.add('active');
        document.getElementById('numeric-chips').style.display = 'none';
        document.getElementById('lotto-games').style.display = 'none';
        document.getElementById('special-games').style.display = 'none';
        if (game === 'lotto') { document.getElementById('lotto-games').style.display = 'flex'; selectGame('lotto3'); }
        else if (game === 'special') { document.getElementById('special-games').style.display = 'flex'; selectGame('bo'); }
        else selectGame('borlette');
    }

    function toggleNumericChips() {
        const div = document.getElementById('numeric-chips');
        div.style.display = div.style.display === 'flex' ? 'none' : 'flex';
        if (div.style.display === 'flex') { document.getElementById('lotto-games').style.display = 'none'; document.getElementById('special-games').style.display = 'none'; }
    }

    function selectGame(game) {
        selectedGame = game;
        const input = document.getElementById('num-input');
        if (game === 'borlette') { input.disabled = false; input.placeholder = '00'; input.maxLength = 2; }
        else if (game === 'lotto3') { input.disabled = false; input.placeholder = '000'; input.maxLength = 3; }
        else if (game === 'lotto4') { input.disabled = false; input.placeholder = '0000'; input.maxLength = 4; }
        else if (game === 'lotto5') { input.disabled = false; input.placeholder = '00000'; input.maxLength = 5; }
        else if (game === 'mariage') { input.disabled = false; input.placeholder = '0000'; input.maxLength = 4; }
        else { input.disabled = true; input.value = ''; input.placeholder = 'Auto'; }
        document.getElementById('lotto4-options').style.display = (game === 'lotto4') ? 'flex' : 'none';
        document.getElementById('lotto5-options').style.display = (game === 'lotto5') ? 'flex' : 'none';
        input.focus();
    }

    function toggleLottoOption(gameType, option) {
        if (gameType === 4) { lotto4Options[option-1] = !lotto4Options[option-1]; }
        else { lotto5Options[option-1] = !lotto5Options[option-1]; }
        const chip = document.querySelector(`#lotto${gameType}-options .option-chip[data-option="${option}"]`);
        if (chip) chip.classList.toggle('active');
    }

    // ---------- Panier ----------
    function addBet() {
        if (!currentDrawId) { alert('Choisissez un tirage'); return; }
        const amt = parseFloat(document.getElementById('amt-input').value);
        if (isNaN(amt) || amt <= 0) { alert('Montant invalide'); return; }
        if (amt > balance) { alert('Solde insuffisant'); return; }

        let num = document.getElementById('num-input').value.trim();
        if (selectedGame === 'borlette' || selectedGame === 'lotto3' || selectedGame === 'lotto4' || selectedGame === 'lotto5' || selectedGame === 'mariage') {
            if (!num) { alert('Entrez un numéro'); return; }
            let clean = num.replace(/[^0-9]/g, '');
            let valid = false;
            if (selectedGame === 'borlette') valid = /^\d{2}$/.test(clean);
            else if (selectedGame === 'lotto3') valid = /^\d{3}$/.test(clean);
            else if (selectedGame === 'lotto4') valid = /^\d{4}$/.test(clean);
            else if (selectedGame === 'lotto5') valid = /^\d{5}$/.test(clean);
            else if (selectedGame === 'mariage') valid = /^\d{4}$/.test(clean);
            if (!valid) { alert('Format invalide'); return; }
            if (selectedGame === 'lotto4') num = clean.slice(0,2)+'-'+clean.slice(2,4);
            else if (selectedGame === 'lotto5') num = clean.slice(0,3)+'-'+clean.slice(3,5);
            else if (selectedGame === 'mariage') num = clean.slice(0,2)+'&'+clean.slice(2,4);
            else num = clean;

            if (selectedGame === 'lotto4') {
                for (let i=0; i<3; i++) {
                    if (lotto4Options[i]) {
                        currentCart.push({ id: Date.now()+Math.random(), game: 'lotto4', number: num, cleanNumber: clean, amount: amt, option: i+1 });
                    }
                }
            } else if (selectedGame === 'lotto5') {
                for (let i=0; i<3; i++) {
                    if (lotto5Options[i]) {
                        currentCart.push({ id: Date.now()+Math.random(), game: 'lotto5', number: num, cleanNumber: clean, amount: amt, option: i+1 });
                    }
                }
            } else {
                currentCart.push({ id: Date.now()+Math.random(), game: selectedGame, number: num, cleanNumber: clean, amount: amt });
            }
        } else {
            let autoBets = [];
            if (selectedGame === 'bo') {
                for (let i=0; i<100; i++) { let n = i.toString().padStart(2,'0'); if (n[0]===n[1]) autoBets.push({ game: 'borlette', number: n, cleanNumber: n, amount: amt }); }
            } else if (selectedGame === 'grap') {
                for (let i=0; i<10; i++) { let n = i.toString().repeat(3); autoBets.push({ game: 'lotto3', number: n, cleanNumber: n, amount: amt }); }
            } else if (selectedGame.startsWith('n')) {
                let digit = parseInt(selectedGame[1]);
                for (let i=0; i<100; i++) { let n = i.toString().padStart(2,'0'); if (parseInt(n[1]) === digit) autoBets.push({ game: 'borlette', number: n, cleanNumber: n, amount: amt }); }
            }
            if (autoBets.length === 0) { alert('Aucune combinaison'); return; }
            autoBets.forEach(b => currentCart.push({ ...b, id: Date.now()+Math.random() }));
        }
        renderCart();
        document.getElementById('num-input').value = '';
        document.getElementById('amt-input').value = '';
        document.getElementById('num-input').focus();
    }

    function removeBet(id) {
        currentCart = currentCart.filter(b => b.id !== id);
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-display');
        const totalEl = document.getElementById('cart-total-display');
        const itemsCount = document.getElementById('items-count');
        if (!currentCart.length) { container.innerHTML = '<div class="empty-msg">Panier vide</div>'; totalEl.innerText = '0 G'; itemsCount.innerText = '0'; return; }
        let total = 0;
        container.innerHTML = currentCart.map(bet => {
            total += bet.amount;
            let display = `${bet.game} ${bet.number} - ${bet.amount} G`;
            if (bet.option) display += ` (Opt${bet.option})`;
            return `<div class="cart-item"><span>${display}</span><button onclick="removeBet(${bet.id})">✕</button></div>`;
        }).join('');
        totalEl.innerText = total.toLocaleString() + ' G';
        itemsCount.innerText = currentCart.length;
    }

    async function validateTicket() {
        if (!currentDrawId) { alert('Choisissez un tirage'); return; }
        if (!currentCart.length) { alert('Panier vide'); return; }
        const draw = draws.find(d => d.id == currentDrawId);
        if (!draw || !draw.active) { alert('Tirage fermé'); return; }
        const total = currentCart.reduce((s,b) => s + b.amount, 0);
        if (total > balance) { alert('Solde insuffisant'); return; }

        const payload = {
            drawId: currentDrawId,
            drawName: draw.name,
            bets: currentCart,
            total
        };
        try {
            const res = await fetch(`${API_CONFIG.BASE_URL}/player/tickets/save`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) {
                alert('Ticket enregistré !');
                currentCart = [];
                renderCart();
                await updateBalance();
                await loadPlayerHistory();
                await loadTransactions();
                await loadWins();
            } else { alert('Erreur: ' + (data.error || '')); }
        } catch(e) { alert('Erreur réseau'); }
    }

    // ---------- Historique ----------
    async function loadPlayerHistory() {
        const res = await fetch(`${API_CONFIG.BASE_URL}/player/tickets`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        const data = await res.json();
        const tickets = data.tickets || [];
        const container = document.getElementById('history-container');
        if (!tickets.length) { container.innerHTML = '<div class="empty-msg">Aucun ticket</div>'; return; }
        container.innerHTML = tickets.map(t => {
            const win = parseFloat(t.win_amount || 0);
            return `<div class="history-item"><div><strong>${t.draw_name}</strong><br><small>${new Date(t.date).toLocaleString()}</small></div><div>${t.total_amount} G ${win>0 ? `<span class="profit">+${win} G</span>` : ''}</div></div>`;
        }).join('');
    }

    async function loadTransactions() {
        const res = await fetch(`${API_CONFIG.BASE_URL}/player/transactions`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        const data = await res.json();
        const transactions = data.transactions || [];
        const container = document.getElementById('transactions-list');
        if (!transactions.length) { container.innerHTML = '<div class="empty-msg">Aucune transaction</div>'; return; }
        container.innerHTML = transactions.map(t => `<div class="transaction-item"><span>${new Date(t.created_at).toLocaleString()}</span><span class="${t.type === 'deposit' ? 'profit' : 'loss'}">${t.type === 'deposit' ? '+' : '-'} ${t.amount} G</span><span>${t.description || t.type}</span></div>`).join('');
    }

    async function loadWins() {
        const res = await fetch(`${API_CONFIG.BASE_URL}/player/tickets`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        const data = await res.json();
        const tickets = (data.tickets || []).filter(t => parseFloat(t.win_amount) > 0);
        const container = document.getElementById('wins-container');
        if (!tickets.length) { container.innerHTML = '<div class="empty-msg">Aucun gain</div>'; return; }
        container.innerHTML = tickets.map(t => `<div class="history-item"><div><strong>${t.draw_name}</strong><br><small>${new Date(t.date).toLocaleString()}</small></div><div class="profit">+ ${parseFloat(t.win_amount).toLocaleString()} G</div></div>`).join('');
    }

    // ---------- Recharge ----------
    function showRechargeOptions() {
        const div = document.getElementById('recharge-options');
        div.style.display = div.style.display === 'none' ? 'block' : 'none';
    }

    async function rechargeWith(method) {
        alert(`Redirection vers ${method}... (fonctionnalité à connecter avec l'API de paiement)`);
        // À implémenter avec l'API MonCash/NatCash
    }

    async function useRechargeCode() {
        const code = document.getElementById('recharge-code').value;
        if (!code) { alert('Entrez un code'); return; }
        try {
            const res = await fetch(`${API_CONFIG.BASE_URL}/player/recharge/code`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                body: JSON.stringify({ code })
            });
            const data = await res.json();
            if (data.success) {
                alert(`Recharge de ${data.amount} G effectuée !`);
                await updateBalance();
                await loadTransactions();
                document.getElementById('recharge-code').value = '';
            } else { alert(data.error || 'Code invalide'); }
        } catch(e) { alert('Erreur'); }
    }

    function setupTabs() {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`${tabId}-tab`).classList.add('active');
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tabId === 'history') loadPlayerHistory();
                if (tabId === 'recharge') loadTransactions();
                if (tabId === 'wins') loadWins();
            });
        });
    }

    window.selectDraw = selectDraw;
    window.selectMainGame = selectMainGame;
    window.toggleNumericChips = toggleNumericChips;
    window.selectGame = selectGame;
    window.toggleLottoOption = toggleLottoOption;
    window.addBet = addBet;
    window.removeBet = removeBet;
    window.validateTicket = validateTicket;
    window.showRechargeOptions = showRechargeOptions;
    window.rechargeWith = rechargeWith;
    window.useRechargeCode = useRechargeCode;
    window.prevSlide = prevSlide;
    window.nextSlide = nextSlide;
</script>
</body>
</html>
